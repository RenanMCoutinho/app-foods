<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Empresas - DriverLog</title>
  <script type="module" crossorigin src="/app-foods/assets/adminEmpresas-BLAmJcor.js"></script>
  <link rel="modulepreload" crossorigin href="/app-foods/assets/firebase-DXTKRB3-.js">
  <link rel="modulepreload" crossorigin href="/app-foods/assets/auth-guard-9aL8b_9r.js">
  <link rel="stylesheet" crossorigin href="/app-foods/assets/index-DkhCsfoI.css">
<link rel="manifest" href="/app-foods/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/app-foods/registerSW.js"></script></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="hidden lg:flex w-64 flex-col bg-slate-900 text-white fixed inset-y-0 left-0 z-30">
            <div class="flex items-center gap-3 px-6 h-16 border-b border-slate-700">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary">
                    <span class="material-symbols-outlined text-xl">local_shipping</span>
                </div>
                <div>
                    <p class="font-black text-sm">DriverLog</p>
                    <p class="text-xs text-slate-400">Administração</p>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="./dashboard.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">dashboard</span> Dashboard</a>
                <a href="./empresas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/20 text-primary font-semibold text-sm"><span
                        class="material-symbols-outlined text-xl">business</span> Empresas</a>
                <a href="./supervisores.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">manage_accounts</span> Supervisores</a>
                <a href="./motoristas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">directions_car</span> Motoristas</a>
                <a href="./relatorio.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">analytics</span> Relatórios</a>
            </nav>
            <div class="px-4 py-4 border-t border-slate-700">
                <button
                    class="logout-btn flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-colors text-sm w-full"><span
                        class="material-symbols-outlined text-xl">logout</span> Sair</button>
            </div>
        </aside>

        <div class="lg:ml-64 flex-1 flex flex-col">
            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-6 sticky top-0 z-10">
                <h1 class="font-black text-lg">Empresas Clientes</h1>
                <button id="btn-nova-empresa"
                    class="flex items-center gap-2 bg-primary text-white font-bold px-4 py-2 rounded-lg text-sm shadow-md hover:bg-primary/90 transition-all">
                    <span class="material-symbols-outlined text-lg">add</span> Nova Empresa
                </button>
            </header>

            <main class="flex-1 p-6">
                <!-- Search -->
                <div class="mb-4">
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-3 top-3 text-slate-400">search</span>
                        <input id="search-empresa" type="text" placeholder="Buscar empresa..."
                            class="w-full pl-10 pr-4 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-sm focus:ring-2 focus:ring-primary outline-none" />
                    </div>
                </div>

                <!-- Table -->
                <div
                    class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="border-b border-slate-100 dark:border-slate-800">
                            <tr class="text-left">
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">
                                    Empresa</th>
                                <th
                                    class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest hidden md:table-cell">
                                    CNPJ</th>
                                <th
                                    class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest hidden md:table-cell">
                                    Frete Padrão</th>
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">Ações
                                </th>
                            </tr>
                        </thead>
                        <tbody id="lista-empresas" class="divide-y divide-slate-100 dark:divide-slate-800">
                            <tr>
                                <td colspan="4" class="text-center p-10 text-slate-400">Carregando empresas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Nova/Editar Empresa -->
    <div id="modal-empresa" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div
            class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 w-full max-w-md shadow-2xl">
            <div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
                <h2 id="modal-titulo" class="font-black text-lg">Nova Empresa</h2>
                <button id="btn-fechar-modal" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <form id="form-empresa" class="p-6 space-y-4">
                <input type="hidden" id="empresa-id" />
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Nome da
                        Empresa</label>
                    <input id="empresa-nome" type="text" required placeholder="Nome completo"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">CNPJ</label>
                    <input id="empresa-cnpj" type="text" placeholder="00.000.000/0001-00"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Valor Padrão de Frete
                        (R$)</label>
                    <input id="empresa-valor" type="number" step="0.01" placeholder="0,00"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-black py-3 rounded-lg shadow-md transition-all">Salvar
                    Empresa</button>
            </form>
        </div>
    </div>

</body>

</html>
