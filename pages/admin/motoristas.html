<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Motoristas - DriverLog Admin</title>
  <script type="module" crossorigin src="/app-foods/assets/adminMotoristas-D7sEJQvv.js"></script>
  <link rel="modulepreload" crossorigin href="/app-foods/assets/firebase-BCqWhaOg.js">
  <link rel="modulepreload" crossorigin href="/app-foods/assets/auth-guard-B8SdUYxm.js">
  <link rel="stylesheet" crossorigin href="/app-foods/assets/index-DkhCsfoI.css">
<link rel="manifest" href="/app-foods/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/app-foods/registerSW.js"></script></head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <div class="flex min-h-screen">
        <aside class="hidden lg:flex w-64 flex-col bg-slate-900 text-white fixed inset-y-0 left-0 z-30">
            <div class="flex items-center gap-3 px-6 h-16 border-b border-slate-700">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-primary"><span
                        class="material-symbols-outlined text-xl">local_shipping</span></div>
                <div>
                    <p class="font-black text-sm">DriverLog</p>
                    <p class="text-xs text-slate-400">Administração</p>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="./dashboard.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">dashboard</span> Dashboard</a>
                <a href="./empresas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">business</span> Empresas</a>
                <a href="./supervisores.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">manage_accounts</span> Supervisores</a>
                <a href="./motoristas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-primary/20 text-primary font-semibold text-sm"><span
                        class="material-symbols-outlined text-xl">directions_car</span> Motoristas</a>
                <a href="./relatorio.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">analytics</span> Relatórios</a>
            </nav>
            <div class="px-4 py-4 border-t border-slate-700">
                <button
                    class="logout-btn flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-colors text-sm w-full"><span
                        class="material-symbols-outlined text-xl">logout</span> Sair</button>
            </div>
        </aside>
        <div class="lg:ml-64 flex-1 flex flex-col">
            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-6 sticky top-0 z-10">
                <h1 class="font-black text-lg">Todos os Motoristas</h1>
                <button id="btn-novo-motorista"
                    class="flex items-center gap-2 bg-orange-500 text-white font-bold px-4 py-2 rounded-lg text-sm shadow-md hover:bg-orange-600 transition-all">
                    <span class="material-symbols-outlined text-lg">add</span> Novo Motorista
                </button>
            </header>
            <main class="flex-1 p-6">
                <!-- Filter -->
                <div class="flex gap-3 mb-4">
                    <select id="filtro-supervisor"
                        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Todos os supervisores</option>
                    </select>
                </div>
                <div
                    class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="border-b border-slate-100 dark:border-slate-800">
                            <tr class="text-left">
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">
                                    Motorista</th>
                                <th
                                    class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest hidden md:table-cell">
                                    E-mail</th>
                                <th
                                    class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest hidden md:table-cell">
                                    Supervisor</th>
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">Ações
                                </th>
                            </tr>
                        </thead>
                        <tbody id="lista-motoristas" class="divide-y divide-slate-100 dark:divide-slate-800">
                            <tr>
                                <td colspan="4" class="text-center p-10 text-slate-400">Carregando motoristas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Novo Motorista -->
    <div id="modal-motorista" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
                <h2 class="font-black text-lg">Novo Motorista</h2>
                <button id="btn-fechar-modal" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <form id="form-motorista" class="p-6 space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Nome Completo</label>
                    <input id="motorista-nome" type="text" required placeholder="Nome do motorista"
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">E-mail</label>
                    <input id="motorista-email" type="email" required placeholder="email@exemplo.com"
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Senha Provisória</label>
                    <input id="motorista-senha" type="password" required placeholder="Mínimo 6 caracteres"
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Supervisor Responsável</label>
                    <select id="motorista-supervisor"
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Selecione um supervisor</option>
                    </select>
                </div>
                <button type="submit"
                    class="w-full bg-orange-500 hover:bg-orange-600 text-white font-black py-3 rounded-lg shadow-md transition-all">Criar
                    Motorista</button>
            </form>
        </div>
    </div>

</body>

</html>
