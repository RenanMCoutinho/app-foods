<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - DriverLog</title>
    <link rel="stylesheet" href="../src/index.css" />
</head>

<body
    class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased flex items-center justify-center min-h-screen p-6">
    <div class="w-full max-w-md">
        <div class="text-center mb-10">
            <div
                class="inline-flex h-16 w-16 items-center justify-center rounded-2xl bg-primary text-white shadow-xl shadow-primary/20 mb-6 font-bold">
                <span class="material-symbols-outlined text-4xl">local_shipping</span>
            </div>
            <h1 class="text-3xl font-black tracking-tight text-slate-900 dark:text-white">Acesse o DriverLog</h1>
            <p class="mt-2 text-slate-500">Gestão Logística Inteligente</p>
        </div>

        <div class="bg-white dark:bg-slate-900 p-8 rounded-xl shadow-2xl border border-white/20">
            <!-- Error message -->
            <div id="login-error"
                class="hidden mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm font-medium">
            </div>

            <form id="login-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">E-mail
                        Cadastrado</label>
                    <input type="email" name="username" placeholder="seu@email.com" required
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-2">Senha de
                        Acesso</label>
                    <input type="password" name="password" placeholder="••••••••" required
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-3 text-sm focus:ring-2 focus:ring-primary transition-all outline-none" />
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-black py-4 rounded-lg shadow-xl shadow-primary/30 transition-all active:scale-95 flex items-center justify-center gap-2">
                    Acessar Conta
                </button>
            </form>
        </div>

        <div class="text-center mt-8 space-y-2">
            <p class="text-sm text-slate-500">
                Sistema Seguro &amp; Criptografado.<br>
                Precisa de ajuda? <a href="#" class="font-bold text-primary hover:underline">Contate o Supervisor</a>
            </p>
            <p class="text-sm text-slate-500">
                Não tem conta? <a href="./cadastro.html" class="font-bold text-primary hover:underline">Criar conta</a>
            </p>
        </div>
    </div>

    <script type="module">
        import { initLogin } from '../src/controllers/login.js';

        window.addEventListener('load', () => {
            initLogin();
        });
    </script>
</body>

</html>
