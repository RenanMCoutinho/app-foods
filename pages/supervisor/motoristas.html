<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Motoristas - Supervisor</title>
    <link rel="stylesheet" href="../../src/index.css" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <div class="flex min-h-screen">
        <aside class="hidden lg:flex w-64 flex-col bg-slate-900 text-white fixed inset-y-0 left-0 z-30">
            <div class="flex items-center gap-3 px-6 h-16 border-b border-slate-700">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-500"><span
                        class="material-symbols-outlined text-xl">local_shipping</span></div>
                <div>
                    <p class="font-black text-sm">DriverLog</p>
                    <p class="text-xs text-slate-400">Supervisor</p>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="./dashboard.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">dashboard</span> Dashboard</a>
                <a href="./entregas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">inventory_2</span> Entregas</a>
                <a href="./motoristas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-500/20 text-blue-400 font-semibold text-sm"><span
                        class="material-symbols-outlined text-xl">directions_car</span> Motoristas</a>

            </nav>
            <div class="px-4 py-4 border-t border-slate-700">
                <button
                    class="logout-btn flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-colors text-sm w-full"><span
                        class="material-symbols-outlined text-xl">logout</span> Sair</button>
            </div>
        </aside>
        <div class="lg:ml-64 flex-1 flex flex-col">
            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-6 sticky top-0 z-10">
                <h1 class="font-black text-lg">Meus Motoristas</h1>
            </header>
            <main class="flex-1 p-6">
                <div id="lista-motoristas" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                    <div class="text-center p-10 text-slate-400 col-span-3">Carregando motoristas...</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Vincular Empresas -->
    <div id="modal-vincular"
        class="hidden fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
        <div
            class="bg-white dark:bg-slate-900 w-full max-w-md rounded-2xl shadow-xl border border-slate-200 dark:border-slate-800 p-6">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-lg font-black text-slate-900 dark:text-white">Vincular Empresas</h3>
                <button type="button" id="btn-fechar-modal"
                    class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <p class="text-sm text-slate-500 mb-4">Selecione quais empresas o motorista <strong
                    id="nome-motorista-modal" class="text-primary"></strong> poderá ver no aplicativo dele:</p>

            <div id="lista-empresas-checkbox" class="flex flex-col gap-3 max-h-60 overflow-y-auto mb-6 pr-2">
                <!-- Checkboxes loaded here -->
            </div>

            <input type="hidden" id="modal-motorista-id">
            <button id="btn-salvar-vinculo"
                class="w-full bg-primary hover:bg-primary/90 text-white font-black py-3 rounded-xl shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined">save</span>
                Salvar Vínculos
            </button>
        </div>
    </div>

    <script type="module">
        import { initGuard } from '../../src/services/auth-guard.js';
        import { initSupervisorMotoristas } from '../../src/controllers/supervisor/motoristas.js';
        initGuard(['supervisor'], () => initSupervisorMotoristas());
    </script>
</body>

</html>
