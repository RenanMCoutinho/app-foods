<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Entregas - Supervisor</title>
    <link rel="stylesheet" href="../../src/index.css" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <div class="flex min-h-screen">
        <aside class="hidden lg:flex w-64 flex-col bg-slate-900 text-white fixed inset-y-0 left-0 z-30">
            <div class="flex items-center gap-3 px-6 h-16 border-b border-slate-700">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-500"><span
                        class="material-symbols-outlined text-xl">local_shipping</span></div>
                <div>
                    <p class="font-black text-sm">DriverLog</p>
                    <p class="text-xs text-slate-400">Supervisor</p>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="./dashboard.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">dashboard</span> Dashboard</a>
                <a href="./empresas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">business</span> Matriz</a>
                <a href="./clientes.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">domain</span> Clientes</a>
                <a href="./entregas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-500/20 text-blue-400 font-semibold text-sm"><span
                        class="material-symbols-outlined text-xl">inventory_2</span> Entregas</a>
                <a href="./motoristas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">directions_car</span> Motoristas</a>

            </nav>
            <div class="px-4 py-4 border-t border-slate-700">
                <button
                    class="logout-btn flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-colors text-sm w-full"><span
                        class="material-symbols-outlined text-xl">logout</span> Sair</button>
            </div>
        </aside>
        <div class="lg:ml-64 flex-1 flex flex-col">
            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-6 sticky top-0 z-10">
                <h1 class="font-black text-lg">Gestão de Entregas</h1>
                <button id="btn-nova-entrega"
                    class="flex items-center gap-2 bg-primary text-white font-bold px-4 py-2 rounded-lg text-sm shadow-md hover:bg-primary/90 transition-all">
                    <span class="material-symbols-outlined text-lg">add</span> Nova Entrega
                </button>
            </header>
            <main class="flex-1 p-6">
                <!-- Filters -->
                <div class="flex gap-3 mb-4 flex-wrap">
                    <select id="filtro-status"
                        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Todos os status</option>
                        <option value="pendente">Pendente</option>
                        <option value="em_rota">Em rota</option>
                        <option value="concluida">Concluída</option>
                    </select>
                    <select id="filtro-motorista"
                        class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Todos os motoristas</option>
                    </select>
                </div>
                <div
                    class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
                    <table class="w-full text-sm">
                        <thead class="border-b border-slate-100 dark:border-slate-800">
                            <tr class="text-left">
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">
                                    Motorista</th>
                                <th
                                    class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest hidden md:table-cell">
                                    Empresa</th>
                                <th
                                    class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest hidden lg:table-cell">
                                    Local</th>
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">Status
                                </th>
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">Valor
                                </th>
                                <th class="px-6 py-4 font-black text-slate-500 uppercase text-xs tracking-widest">Ações
                                </th>
                            </tr>
                        </thead>
                        <tbody id="lista-entregas" class="divide-y divide-slate-100 dark:divide-slate-800">
                            <tr>
                                <td colspan="6" class="text-center p-10 text-slate-400">Carregando entregas...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Modal Nova Entrega -->
    <div id="modal-entrega" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
                <h2 id="modal-titulo" class="font-black text-lg">Nova Entrega</h2>
                <button id="btn-fechar-modal" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <form id="form-entrega" class="p-6 space-y-4">
                <input type="hidden" id="entrega-id" />
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Motorista</label>
                    <select id="entrega-motorista" required
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Selecione o motorista</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Empresa</label>
                    <select id="entrega-empresa" required
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Selecione a empresa</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Local</label>
                    <select id="entrega-local"
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="">Selecione o local (opcional)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Tipo de Serviço</label>
                    <select id="entrega-tipo" required
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none">
                        <option value="Normal">Entrega Normal</option>
                        <option value="Cesta">Entrega de Cesta</option>
                        <option value="Agendada">Entrega Agendada</option>
                        <option value="Coleta">Coleta de Mercadoria</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">Valor (R$)</label>
                    <input id="entrega-valor" type="number" step="0.01"
                        placeholder="0,00 (usa padrão da empresa se vazio)"
                        class="w-full bg-slate-50 border-none ring-1 ring-slate-200 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-black py-3 rounded-lg shadow-md transition-all">Criar
                    Entrega</button>
            </form>
        </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav
        class="lg:hidden h-16 border-t border-slate-200 bg-white flex items-center justify-around px-4 fixed bottom-0 left-0 right-0 z-10">
        <a href="./dashboard.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">dashboard</span></a>
        <a href="./empresas.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">business</span></a>
        <a href="./clientes.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">domain</span></a>
        <a href="./entregas.html" class="flex flex-col items-center gap-1 text-blue-500"><span
                class="material-symbols-outlined">inventory_2</span></a>
        <a href="./motoristas.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">directions_car</span></a>
    </nav>
    <script type="module">
        import { initGuard } from '../../src/services/auth-guard.js';
        import { initSupervisorEntregas } from '../../src/controllers/supervisor/entregas.js';
        initGuard(['supervisor'], () => initSupervisorEntregas());
    </script>
</body>

</html>
