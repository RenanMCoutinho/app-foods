<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Empresas - Supervisor</title>
    <link rel="stylesheet" href="../../src/index.css" />
</head>

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <div class="flex min-h-screen">
        <aside class="hidden lg:flex w-64 flex-col bg-slate-900 text-white fixed inset-y-0 left-0 z-30">
            <div class="flex items-center gap-3 px-6 h-16 border-b border-slate-700">
                <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-500"><span
                        class="material-symbols-outlined text-xl">local_shipping</span></div>
                <div>
                    <p class="font-black text-sm">DriverLog</p>
                    <p class="text-xs text-slate-400">Supervisor</p>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <a href="./dashboard.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">dashboard</span> Dashboard</a>
                <a href="./empresas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg bg-blue-500/20 text-blue-400 font-semibold text-sm"><span
                        class="material-symbols-outlined text-xl">business</span> Empresas</a>
                <a href="./entregas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">inventory_2</span> Entregas</a>
                <a href="./motoristas.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">directions_car</span> Motoristas</a>
                <a href="./locais.html"
                    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors text-sm"><span
                        class="material-symbols-outlined text-xl">location_on</span> Locais</a>
            </nav>
            <div class="px-4 py-4 border-t border-slate-700">
                <button
                    class="logout-btn flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:bg-red-500/20 hover:text-red-400 transition-colors text-sm w-full"><span
                        class="material-symbols-outlined text-xl">logout</span> Sair</button>
            </div>
        </aside>

        <div class="lg:ml-64 flex-1 flex flex-col">
            <header
                class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-between px-6 sticky top-0 z-10">
                <h1 class="font-black text-lg">Empresas Clientes</h1>
                <button id="btn-nova-empresa"
                    class="flex items-center gap-2 bg-primary text-white font-bold px-4 py-2 rounded-lg text-sm shadow-md hover:bg-primary/90 transition-all">
                    <span class="material-symbols-outlined text-lg">add</span> Nova Empresa
                </button>
            </header>

            <main class="flex-1 p-6">
                <div id="lista-empresas" class="space-y-4">
                    <div class="text-center p-10 text-slate-400">Carregando empresas...</div>
                </div>
            </main>
        </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav
        class="lg:hidden h-16 border-t border-slate-200 bg-white flex items-center justify-around px-4 fixed bottom-0 left-0 right-0 z-10">
        <a href="./dashboard.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">dashboard</span></a>
        <a href="./empresas.html" class="flex flex-col items-center gap-1 text-blue-500"><span
                class="material-symbols-outlined">business</span></a>
        <a href="./entregas.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">inventory_2</span></a>
        <a href="./motoristas.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">directions_car</span></a>
        <a href="./locais.html" class="flex flex-col items-center gap-1 text-slate-400"><span
                class="material-symbols-outlined">location_on</span></a>
    </nav>

    <!-- Modal Nova/Editar Empresa -->
    <div id="modal-empresa" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 rounded-2xl w-full max-w-md shadow-2xl overflow-y-auto max-h-[90vh]">
            <div class="flex items-center justify-between p-6 border-b border-slate-100 dark:border-slate-800">
                <h2 id="modal-titulo" class="font-black text-lg">Nova Empresa</h2>
                <button id="btn-fechar-modal" class="p-2 text-slate-400 hover:bg-slate-100 rounded-lg"><span
                        class="material-symbols-outlined">close</span></button>
            </div>
            <form id="form-empresa" class="p-6 space-y-4">
                <input type="hidden" id="empresa-id" />
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">Nome da
                        Empresa</label>
                    <input id="empresa-nome" type="text" required placeholder="Ex: Mercado Central"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 dark:text-slate-300 mb-1">CNPJ
                        (opcional)</label>
                    <input id="empresa-cnpj" type="text" placeholder="00.000.000/0001-00"
                        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary outline-none" />
                </div>

                <!-- Tipos de Entrega -->
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-sm font-bold text-slate-700 dark:text-slate-300">Tipos de Entrega</label>
                        <button type="button" id="btn-add-tipo"
                            class="text-xs font-bold text-primary flex items-center gap-1 hover:underline">
                            <span class="material-symbols-outlined text-sm">add</span> Adicionar tipo
                        </button>
                    </div>
                    <div id="lista-tipos" class="space-y-2"></div>
                    <p class="text-xs text-slate-400 mt-2 italic">Ex: Entrega Normal — R$ 15,00</p>
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-primary/90 text-white font-black py-3 rounded-lg shadow-md transition-all">Salvar
                    Empresa</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initGuard } from '../../src/services/auth-guard.js';
        import { initSupervisorEmpresas } from '../../src/controllers/supervisor/empresas.js';
        initGuard(['supervisor']);
        window.addEventListener('load', () => { initSupervisorEmpresas(); });
    </script>
</body>

</html>
