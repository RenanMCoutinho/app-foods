<div class="page" data-name="home">
  <!-- Navbar Superior -->
  <div class="navbar">
    <div class="navbar-bg bg-color-green"></div>
    <div class="navbar-inner sliding">
      <div class="title text-color-white">DriverLog</div>
    </div>
  </div>

  <!-- Toolbar Inferior (Tabbar) -->
  <div class="toolbar tabbar toolbar-bottom bg-color-green">
    <div class="toolbar-inner">
      <a href="/" class="tab-link tab-link-active text-color-white">
        <i class="icon f7-icons if-not-md">house</i>
        <i class="icon material-icons if-md">home</i>
      </a>
      <a href="/cadastro/" class="tab-link text-color-white">
        <i class="icon f7-icons if-not-md">building_2_fill</i>
        <i class="icon material-icons if-md">business</i>
      </a>
      <a href="/relatorio/" class="tab-link text-color-white">
        <i class="icon f7-icons if-not-md">doc_text_fill</i>
        <i class="icon material-icons if-md">description</i>
      </a>
    </div>
  </div>

  <!-- Scrollable Page Content -->
  <div class="page-content">
    <div class="block-title">Entregas do Dia</div>
    <div class="block block-strong card">
      
      <!-- Navegação de Data -->
      <div class="row display-flex justify-content-center align-items-center margin-bottom">
        <button class="button button-small button-outline col" id="btnAnterior">
          <i class="icon f7-icons if-not-md">chevron_left</i>
          <i class="icon material-icons if-md">chevron_left</i>
        </button>
        <div class="col-auto text-align-center" style="min-width: 150px">
          <h3 class="no-margin"><span id="dataHoje"></span></h3>
        </div>
        <button class="button button-small button-outline col" id="btnProximo">
          <i class="icon f7-icons if-not-md">chevron_right</i>
          <i class="icon material-icons if-md">chevron_right</i>
        </button>
      </div>

      <!-- Select Empresa -->
      <div class="list no-hairlines-md">
        <ul>
          <li class="item-content item-input">
            <div class="item-inner">
              <div class="item-title item-label">Selecione a Empresa</div>
              <div class="item-input-wrap">
                <select id="empresaSelect" placeholder="Selecione...">
                  <option value="">Selecione...</option>
                </select>
              </div>
            </div>
          </li>
          
          <li class="item-content item-input">
            <div class="item-inner">
              <div class="item-title item-label">Tipo de Entrega</div>
              <div class="item-input-wrap">
                <select id="tipoEntregaSelect" disabled>
                   <option value="">Selecione uma empresa primeiro</option>
                </select>
              </div>
            </div>
          </li>
        </ul>
      </div>

      <button class="button button-fill button-large button-raised color-green margin-bottom" id="btnRegistrar">
        <i class="icon f7-icons if-not-md margin-right">truck</i>
        <i class="icon material-icons if-md margin-right">local_shipping</i>
        Registrar Frete
      </button>

      <div class="list media-list inset">
        <ul id="relatorioList">
          <!-- Items inseridos via JS -->
        </ul>
      </div>

      <div class="block-footer text-align-right margin-top">
        <strong>Total do dia:</strong>
        R$ <span id="totalHoje">0.00</span>
      </div>

    </div>
  </div>
</div>
