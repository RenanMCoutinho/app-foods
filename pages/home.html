<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Tela do Dia - DriverLog</title>
  <script type="module" crossorigin src="/app-foods/assets/home-C_n0EUB8.js"></script>
  <link rel="modulepreload" crossorigin href="/app-foods/assets/firebase-DXeuB9Ti.js">
  <link rel="modulepreload" crossorigin href="/app-foods/assets/auth-guard-ahADkYB_.js">
  <link rel="stylesheet" crossorigin href="/app-foods/assets/index-DAvgRigT.css">
<link rel="manifest" href="/app-foods/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/app-foods/registerSW.js"></script></head>

<body class="bg-slate-50 dark:bg-background-dark text-slate-900 dark:text-slate-100 antialiased min-h-screen pb-20">

  <!-- Header -->
  <header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 sticky top-0 z-20">
    <div class="flex items-center justify-between px-5 h-14">
      <div>
        <h1 class="font-black text-base">Tela do Dia</h1>
        <p id="data-hoje" class="text-xs text-slate-500"></p>
      </div>
      <div class="flex items-center gap-3">
        <div class="text-right">
          <p class="text-xs text-slate-500">Total hoje</p>
          <p id="total-dia" class="font-black text-primary text-base">R$ 0,00</p>
        </div>
      </div>
    </div>
  </header>

  <main class="max-w-lg mx-auto p-5 space-y-5">

    <!-- Selecionar Empresa -->
    <div class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5 shadow-sm">
      <h2 class="font-black mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">business</span>
        Selecionar Empresa
      </h2>
      <select id="select-empresa"
        class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-primary outline-none font-medium">
        <option value="">— Escolha uma empresa —</option>
      </select>
    </div>

    <!-- Tipos de Entrega -->
    <div id="card-tipos"
      class="hidden bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 p-5 shadow-sm">
      <h2 class="font-black mb-3 flex items-center gap-2">
        <span class="material-symbols-outlined text-primary">inventory_2</span>
        Tipos de Entrega
      </h2>
      <div id="lista-tipos" class="space-y-2"></div>
    </div>

    <!-- Entregas do Dia -->
    <div
      class="bg-white dark:bg-slate-900 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-sm overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between">
        <h2 class="font-black flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">checklist</span>
          Entregas Registradas
        </h2>
        <span id="contagem-dia" class="bg-primary/10 text-primary text-xs font-black px-2 py-1 rounded-full">0</span>
      </div>
      <div id="lista-entregas-dia" class="divide-y divide-slate-100 dark:divide-slate-800">
        <div class="p-8 text-center">
          <span class="material-symbols-outlined text-4xl text-slate-200 dark:text-slate-700">inbox</span>
          <p class="text-sm text-slate-400 mt-2">Nenhuma entrega registrada hoje.<br>Selecione uma empresa e adicione!
          </p>
        </div>
      </div>
    </div>
  </main>

  <!-- Bottom Nav -->
  <nav
    class="h-16 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-around px-4 fixed bottom-0 left-0 right-0 z-10">
    <a href="./dashboard.html" class="flex flex-col items-center gap-0.5 text-slate-400 text-xs">
      <span class="material-symbols-outlined">dashboard</span>Dashboard
    </a>
    <a href="./home.html" class="flex flex-col items-center gap-0.5 text-primary text-xs font-bold">
      <span class="material-symbols-outlined">today</span>Hoje
    </a>
    <a href="./relatorio.html" class="flex flex-col items-center gap-0.5 text-slate-400 text-xs">
      <span class="material-symbols-outlined">bar_chart</span>Histórico
    </a>
    <button class="logout-btn flex flex-col items-center gap-0.5 text-slate-400 text-xs">
      <span class="material-symbols-outlined">logout</span>Sair
    </button>
  </nav>

</body>

</html>
