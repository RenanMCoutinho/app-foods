<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Histórico de Entregas - DriverLog</title>
  <script type="module" crossorigin src="/app-foods/assets/relatorio-Cn-vJ-Ud.js"></script>
  <link rel="modulepreload" crossorigin href="/app-foods/assets/firebase-BCqWhaOg.js">
  <link rel="modulepreload" crossorigin href="/app-foods/assets/auth-guard-B8SdUYxm.js">
  <link rel="stylesheet" crossorigin href="/app-foods/assets/index-DkhCsfoI.css">
<link rel="manifest" href="/app-foods/manifest.webmanifest"><script id="vite-plugin-pwa:register-sw" src="/app-foods/registerSW.js"></script></head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased min-h-screen">
    <div class="flex flex-col min-h-screen">
        <!-- Header -->
        <header
            class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md flex items-center justify-between px-6 sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <a href="./dashboard.html"
                    class="p-2 -ml-2 text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-colors">
                    <span class="material-symbols-outlined">arrow_back</span>
                </a>
                <h1 class="text-lg font-bold tracking-tight">Histórico</h1>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-xs font-black text-slate-400 uppercase tracking-widest">Total:</span>
                <span id="totalRelatorio" class="text-sm font-black text-primary">0,00</span>
            </div>
        </header>

        <main class="flex-1 p-6 space-y-8 max-w-2xl mx-auto w-full">
            <!-- Filter Section -->
            <section
                class="bg-white dark:bg-slate-900 p-6 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-xl space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5">Data
                            Início</label>
                        <input id="dataInicio" type="date"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none transition-all" />
                    </div>
                    <div>
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1.5">Data
                            Fim</label>
                        <input id="dataFim" type="date"
                            class="w-full bg-slate-50 dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-primary outline-none transition-all" />
                    </div>
                </div>
                <button id="btnFiltrar"
                    class="w-full bg-slate-900 dark:bg-white dark:text-slate-900 text-white font-black py-3 rounded-xl shadow-lg transition-all active:scale-[0.98] flex items-center justify-center gap-2 text-sm uppercase">
                    <span class="material-symbols-outlined text-lg">filter_list</span>
                    Filtrar Período
                </button>
            </section>

            <!-- Results Section -->
            <div id="relatorioDias" class="space-y-6">
                <!-- JS injected cards -->
                <div class="p-12 text-center text-slate-400">
                    <span class="material-symbols-outlined text-4xl mb-2 opacity-20">date_range</span>
                    <p class="text-sm">Selecione um período para visualizar o histórico.</p>
                </div>
            </div>
        </main>

        <!-- Dynamic Nav (Mobile) -->
        <nav
            class="h-16 border-t border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex items-center justify-around px-4 sticky bottom-0 z-10 lg:hidden">
            <a href="./dashboard.html" class="flex flex-col items-center gap-1 text-slate-400">
                <span class="material-symbols-outlined">home</span>
            </a>
            <a href="./home.html" class="flex flex-col items-center gap-1 text-slate-400">
                <span class="material-symbols-outlined">add_circle</span>
            </a>
            <a href="./relatorio.html" class="flex flex-col items-center gap-1 text-primary">
                <span class="material-symbols-outlined">analytics</span>
            </a>
        </nav>
    </div>

</body>

</html>
