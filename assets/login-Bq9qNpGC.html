<div class="page" data-name="login">
    <div class="page-content login-screen-content">
        <div class="login-screen-title" style="margin-top: 50px; font-weight: bold; color: var(--f7-theme-color);">
            <i class="f7-icons" style="font-size: 48px; display: block; margin-bottom: 10px;">truck</i>
            DriverLog
        </div>
        <form id="login-form">
            <div class="list">
                <ul>
                    <li class="item-content item-input item-input-with-info">
                        <div class="item-inner">
                            <div class="item-title item-label">Username</div>
                            <div class="item-input-wrap">
                                <input type="text" name="username" placeholder="Seu e-mail cadastrado" required
                                    validate />
                                <span class="input-clear-button"></span>
                            </div>
                        </div>
                    </li>
                    <li class="item-content item-input item-input-with-info">
                        <div class="item-inner">
                            <div class="item-title item-label">Password</div>
                            <div class="item-input-wrap">
                                <input type="password" name="password" placeholder="Sua senha" required validate />
                                <span class="input-clear-button"></span>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
            <div class="list">
                <ul style="padding: 0 16px;">
                    <li>
                        <button class="button button-fill button-large button-login-email">Acessar Conta</button>
                    </li>
                </ul>
                <div class="block-footer text-align-center" style="margin-top: 20px;">
                    Sistema de Gestão Logística Integrada.<br>
                    Para obter acesso, contate o Supervisor.
                </div>
            </div>
        </form>
    </div>
</div>
